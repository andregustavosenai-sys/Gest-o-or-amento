<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gestão de Orçamento</title>
  <link rel="stylesheet" href="/Estilo/Estilo.css">
</head>
<body>

<div class="container">

  <!-- MENU -->
  <aside class="menu">
    <p class="red">■ Nova Tarefa</p>
    <p class="green">■ Minhas Tarefas</p>
    <p class="yellow">■ Orçamento final</p>
  </aside>

  <!-- CONTEÚDO -->
  <main class="conteudo">

    <h2>Gestão de Orçamento - <span>Projeto</span></h2>

    <button class="btn">Adicionar nova tarefa</button>

    <div class="form">

      <label>Nova tarefa</label>
      <input type="text" placeholder="desenvolvimento das paginas internas">

      <div class="linha">
        <div>
          <label>Desenvolvimento de Tarefa</label>
          <input type="text" placeholder="pesquisar">
        </div>
      </div>

      <label>Descrição</label>
      <textarea></textarea>

      <div class="linha">
        <div>
          <label>Horas estimadas</label>
          <input type="text" id="horas" value="42 horas">
        </div>

        <div>
          <label>Custo por hora</label>
          <input type="text" id="valor" value="180">
        </div>

        <div>
          <button id="btnOpcoes">opções de cálculo</button>
        </div>
      </div>

      <div class="linha">
        <div>
          <label>Data de início</label>
          <input type="date">
        </div>

        <div>
          <label>Data de termino</label>
          <input type="date">
        </div>

        <div>
          <button class="btn">Adicionar tarefa</button>
        </div>
      </div>

    </div>

  </main>

  <!-- RESUMO -->
  <aside class="resumo">
    <h3>Resumo do projeto</h3>
    <p>Total de Tarefas<br><strong>8</strong></p>
    <p>Total de horas:<br><strong id="totalHoras">184 horas</strong></p>
    <p>Custo Total Estimado:<br><strong id="total">R$ 0,00</strong></p>
  </aside>

</div>

<!-- PAINEL LATERAL -->
<div class="painel" id="painel">

  <div class="box desconto">
    <h4>Desconto</h4>
    <input type="number" id="desconto" value="10"> %
  </div>

  <div class="box urgencia">
    <h4>Urgência</h4>

    <label><input type="radio" name="urgencia" value="0" checked> Sem urgência</label>
    <label><input type="radio" name="urgencia" value="20"> +20%</label>
    <label><input type="radio" name="urgencia" value="50"> +50%</label>

  </div>

</div>

<script src="/Scripts/scripts.js"></script>
</body>
</html>
