<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gestão de Orçamento</title>
  <link rel="stylesheet" href="/Estilo/Estilo.css">
</head>
<body>

<div class="container">


  <aside class="sidebar">
    <ul>
      <li class="red">Nova Tarefa</li>
      <li class="green">Minhas Tarefas</li>
      <li class="yellow">Orçamento final</li>
    </ul>
  </aside>

 
  <main class="main">

    <h1>Gestão de Orçamento - <span>Projeto</span></h1>

    <button class="btn-top">Adicionar nova tarefa</button>

    <h3>Nova tarefa</h3>

    <div class="form">

      <div class="row">
        <div>
          <label>Descrição</label>
          <input type="text" value="desenvolvimento das paginas internas">
        </div>

        <div>
          <label>Descrição</label>
          <input type="text" value="pesquisar">
        </div>
      </div>

      <label>Descrição</label>
      <input type="text" class="full">

      <div class="row">
        <div>
          <label>Horas estimadas</label>
          <input type="text" value="42 horas">
        </div>

        <div>
          <label>Custo por hora</label>
          <input type="text" value="R$180,00">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Data de inicio</label>
          <input type="text" value="5/05/2026">
        </div>

        <div>
          <label>Data de termino</label>
          <input type="text" value="20/05/2026">
        </div>

        <button class="btn">Adicionar tarefa</button>
      </div>

    </div>

  </main>


  <aside class="summary">
    <h3>Resumo do projeto</h3>

    <p>Total de Tarefas:</p>
    <span>8</span>

    <p>Total de horas:</p>
    <span>184 horas</span>

    <p>Custo Total Estimado:</p>
    <span class="price">R$28.740,00</span>
  </aside>

</div>
    <script src="../Scripts/scripts.js"></script>
</body>
</html>
